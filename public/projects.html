<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Projects - r3dg0d</title>
    <link rel="icon" type="image/jpeg" href="./favicon.jpg">
    <link rel="stylesheet" href="./styles.css">
    <style>
        .project-item {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #333;
            background: rgba(0, 0, 0, 0.3);
        }
        .project-item h3 {
            margin-top: 0;
            margin-bottom: 10px;
        }
        .project-item h3 a {
            color: #0f0;
            text-decoration: none;
        }
        .project-item h3 a:hover {
            text-decoration: underline;
        }
        .project-meta {
            color: #888;
            font-size: 0.9em;
            margin-top: 8px;
        }
        .project-description {
            margin: 10px 0;
            line-height: 1.5;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }
        .error {
            color: #f00;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="snow"></div>
    <div id="overlay"></div>
    <div id="wrapper">
        <table>
            <tbody>
                <tr>
                    <td id="menutd" style="max-width: 225px">
                        <div class="box" style="margin-bottom: 10px;">
                            <a href="/">Home</a>
                            <br/>
                            <a href="/blog">Blog</a>
                            <br/>
                            <a href="/projects">Projects</a>
                            <br/>
                            <a href="/youtube">YouTube</a>
                        </div>
                        <div class="box" style="margin-top: 10px; margin-bottom: 10px;">
                            <div class="inblob" id="pulser"></div>
                            <b>Last Song:</b>
                            <a href="" target="_blank" id="songlink">
                                <div id="musicbox">
                                    <img src="" width="50" height="50" id="albumcover" alt="Album cover" style="display: none;"/>
                                    <div id="songtext">
                                        <span id="songname">—</span>
                                        <span id="artist">—</span>
                                    </div>
                                </div>
                            </a>
                            <div id="lastplayed" style="color: gray; margin-top: 6px; clear: both;">—</div>
                        </div>
                        <div class="box" style="margin-top: 10px; margin-bottom: 10px;">
                            <div id="view-counter">
                                <b>Views:</b> <span id="view-count">—</span>
                            </div>
                        </div>
                    </td>
                    <td id="maintd">
                        <div class="box" id="mainbox">
                            <h2>Projects</h2>
                            <p>Here are some of my projects from GitHub:</p>
                            <div id="projects-container">
                                <div class="loading">Loading projects...</div>
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="/js/app.js"></script>
    <script>
        // Load projects from GitHub API
        async function loadProjects() {
            const container = document.getElementById('projects-container');
            
            try {
                const response = await fetch('https://api.github.com/users/r3dg0d/repos?per_page=100&sort=updated');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const repos = await response.json();
                
                // Filter out forks and sort by updated date
                const projects = repos
                    .filter(repo => !repo.fork)
                    .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
                
                if (projects.length === 0) {
                    container.innerHTML = '<div class="error">No projects found.</div>';
                    return;
                }
                
                container.innerHTML = '';
                
                projects.forEach(repo => {
                    const projectDiv = document.createElement('div');
                    projectDiv.className = 'project-item';
                    
                    const name = repo.name;
                    const description = repo.description || 'No description available.';
                    const url = repo.html_url;
                    const language = repo.language || 'N/A';
                    const stars = repo.stargazers_count || 0;
                    const updated = new Date(repo.updated_at).toLocaleDateString();
                    
                    projectDiv.innerHTML = `
                        <h3><a href="${url}" target="_blank" rel="noopener noreferrer">${name}</a></h3>
                        <div class="project-description">${description}</div>
                        <div class="project-meta">
                            Language: ${language} | 
                            Stars: ${stars} | 
                            Updated: ${updated}
                        </div>
                    `;
                    
                    container.appendChild(projectDiv);
                });
            } catch (error) {
                console.error('Error loading projects:', error);
                container.innerHTML = `<div class="error">Error loading projects: ${error.message}</div>`;
            }
        }
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            loadProjects();
        });
    </script>
</body>
</html>
