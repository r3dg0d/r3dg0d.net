<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube - r3dg0d</title>
    <link rel="icon" type="image/jpeg" href="./favicon.jpg">
    <link rel="stylesheet" href="./styles.css">
    <style>
        .youtube-header {
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #5dff8a;
            position: relative;
        }
        
        .youtube-header h1 {
            color: #5dff8a;
            font-size: 2em;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #5dff8a;
        }
        
        .youtube-header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100px;
            height: 2px;
            background: #5dff8a;
            box-shadow: 0 0 10px #5dff8a;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .video-item {
            border: 1px solid #363a3f;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 2px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .video-item:hover {
            border-color: #5dff8a;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 15px rgba(93, 255, 138, 0.1);
            transform: translateY(-2px);
        }
        
        .video-embed-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            background: #000;
        }
        
        .video-embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .video-info {
            padding: 15px;
        }
        
        .video-title {
            color: #5dff8a;
            font-size: 1.1em;
            margin-bottom: 10px;
            line-height: 1.4;
            text-shadow: 0 0 5px #5dff8a;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .video-title a {
            color: #5dff8a;
            text-decoration: none;
        }
        
        .video-title a:hover {
            text-decoration: underline;
        }
        
        .video-meta {
            color: #888;
            font-size: 0.85em;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
        }
        
        .video-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 1.1em;
        }
        
        .error {
            color: #f00;
            padding: 20px;
            text-align: center;
            border: 1px solid #f00;
            background: rgba(255, 0, 0, 0.1);
        }
        
        .channel-link {
            margin-top: 20px;
            text-align: center;
            padding: 15px;
            border-top: 1px solid #363a3f;
        }
        
        .channel-link a {
            color: #5dff8a;
            text-decoration: none;
            font-size: 1.1em;
        }
        
        .channel-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="snow"></div>
    <div id="overlay"></div>
    <div id="wrapper">
        <table>
            <tbody>
                <tr>
                    <td id="menutd" style="max-width: 225px">
                        <div class="box" style="margin-bottom: 10px;">
                            <a href="/">Home</a>
                            <br/>
                            <a href="/blog">Blog</a>
                            <br/>
                            <a href="/projects">Projects</a>
                            <br/>
                            <a href="/youtube">YouTube</a>
                        </div>
                        <div class="box" style="margin-top: 10px; margin-bottom: 10px;">
                            <div class="inblob" id="pulser"></div>
                            <b>Last Song:</b>
                            <a href="" target="_blank" id="songlink">
                                <div id="musicbox">
                                    <img src="" width="50" height="50" id="albumcover" alt="Album cover" style="display: none;"/>
                                    <div id="songtext">
                                        <span id="songname">—</span>
                                        <span id="artist">—</span>
                                    </div>
                                </div>
                            </a>
                            <div id="lastplayed" style="color: gray; margin-top: 6px; clear: both;">—</div>
                        </div>
                        <div class="box" style="margin-top: 10px; margin-bottom: 10px;">
                            <div id="view-counter">
                                <b>Views:</b> <span id="view-count">—</span>
                            </div>
                        </div>
                    </td>
                    <td id="maintd">
                        <div class="box" id="mainbox">
                            <div class="youtube-header">
                                <h1>YouTube Videos</h1>
                            </div>
                            
                            <div id="videos-container">
                                <div class="loading">Loading videos...</div>
                            </div>
                            
                            <div class="channel-link">
                                <a href="https://www.youtube.com/@128bytes8" target="_blank" rel="noopener noreferrer">
                                    → Visit my YouTube channel
                                </a>
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="/js/app.js"></script>
    <script>
        // Format number with commas
        function formatNumber(num) {
            if (!num) return '0';
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
        
        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'Unknown date';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }
        
        // Create video element
        function createVideoElement(video) {
            const videoDiv = document.createElement('div');
            videoDiv.className = 'video-item';
            
            const embedUrl = `https://www.youtube.com/embed/${video.id}`;
            
            let metaHtml = '';
            if (video.viewCount !== undefined) {
                metaHtml += `<span>👁️ ${formatNumber(video.viewCount)} views</span>`;
            }
            if (video.likeCount !== undefined) {
                metaHtml += `<span>👍 ${formatNumber(video.likeCount)} likes</span>`;
            }
            if (video.published) {
                metaHtml += `<span>📅 ${formatDate(video.published)}</span>`;
            }
            
            videoDiv.innerHTML = `
                <div class="video-embed-container">
                    <iframe 
                        src="${embedUrl}" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                </div>
                <div class="video-info">
                    <div class="video-title">
                        <a href="${video.url}" target="_blank" rel="noopener noreferrer">${video.title}</a>
                    </div>
                    <div class="video-meta">
                        ${metaHtml}
                    </div>
                </div>
            `;
            
            return videoDiv;
        }
        
        // Load videos from API
        async function loadVideos() {
            const container = document.getElementById('videos-container');
            
            try {
                // Add timestamp to prevent caching
                const timestamp = new Date().getTime();
                const response = await fetch(`/api/youtube/videos?t=${timestamp}`, {
                    method: 'GET',
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (!data.videos || data.videos.length === 0) {
                    container.innerHTML = '<div class="error">No videos found.</div>';
                    return;
                }
                
                container.innerHTML = '<div class="video-grid"></div>';
                const grid = container.querySelector('.video-grid');
                
                data.videos.forEach(video => {
                    const videoElement = createVideoElement(video);
                    grid.appendChild(videoElement);
                });
            } catch (error) {
                console.error('Error loading videos:', error);
                container.innerHTML = `<div class="error">Error loading videos: ${error.message}</div>`;
            }
        }
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            loadVideos();
        });
    </script>
</body>
</html>
